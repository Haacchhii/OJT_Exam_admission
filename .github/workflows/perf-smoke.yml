name: Performance Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - backend/src/**
      - backend/scripts/perf-smoke.mjs
      - backend/package.json
      - frontend-ts/src/**
      - .github/workflows/perf-smoke.yml

jobs:
  perf-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Run Perf Smoke Checks
        working-directory: backend
        env:
          PERF_SMOKE_BASE_URL: ${{ secrets.PERF_SMOKE_BASE_URL }}
          PERF_SMOKE_TOKEN: ${{ secrets.PERF_SMOKE_TOKEN }}
          PERF_SMOKE_REQUIRED: ${{ vars.PERF_SMOKE_REQUIRED }}
          PERF_SMOKE_SAMPLES: ${{ vars.PERF_SMOKE_SAMPLES }}
        run: npm run perf:smoke
