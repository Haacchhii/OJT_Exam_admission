name: Frontend Bundle Budget

on:
  pull_request:
    paths:
      - 'frontend-ts/**'
      - '.github/workflows/frontend-bundle-budget.yml'
  push:
    branches:
      - main
    paths:
      - 'frontend-ts/**'
      - '.github/workflows/frontend-bundle-budget.yml'

jobs:
  bundle-budget:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: frontend-ts

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and enforce budgets
        run: npm run build:ci
