<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8fafc" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>
    <title>GOLDEN KEY Integrated School of St. Joseph — Admission & Exam System</title>
    <script>try{if(localStorage.getItem('gk_dark')==='1')document.documentElement.classList.add('dark')}catch(e){}</script>
    <style>
      #root{min-height:100vh;background:#f8fafc}
      #root .gk-loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
      #root .gk-spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#2d6a4f;border-radius:50%;animation:gk-spin .7s linear infinite;}
      @keyframes gk-spin{to{transform:rotate(360deg)}}
      #root .gk-loading-text{font-family:system-ui,-apple-system,sans-serif;font-size:14px;color:#64748b;}
    </style>
  </head>
  <body>
    <div id="root">
      <div class="gk-loading" aria-live="polite" aria-label="Loading application">
        <div class="gk-spinner"></div>
        <span class="gk-loading-text">Loading…</span>
      </div>
    </div>
    <noscript>You need to enable JavaScript to run this application.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
